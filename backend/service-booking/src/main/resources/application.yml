spring:
  application:
    name: peak-booking-service
  profiles:
    include: common
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/peak_booking?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:peak}
    password: ${SPRING_DATASOURCE_PASSWORD:peak}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: ${SPRING_DATASOURCE_MAX_POOL_SIZE:20}
      minimum-idle: ${SPRING_DATASOURCE_MIN_IDLE:5}
      connection-timeout: ${SPRING_DATASOURCE_CONNECTION_TIMEOUT_MS:2000}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

springdoc:
  info:
    title: Peak Booking API
    version: v1
