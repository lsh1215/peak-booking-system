spring:
  application:
    name: peak-booking-service
  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: non_null
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/peak_booking?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:peak}
    password: ${SPRING_DATASOURCE_PASSWORD:peak}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: ${SPRING_DATASOURCE_MAX_POOL_SIZE:10}
      minimum-idle: ${SPRING_DATASOURCE_MIN_IDLE:2}
      connection-timeout: ${SPRING_DATASOURCE_CONNECTION_TIMEOUT_MS:250}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  sql:
    init:
      mode: ${SPRING_SQL_INIT_MODE:never}
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      timeout: ${SPRING_DATA_REDIS_TIMEOUT:500ms}

peak-booking:
  sale-event-id: ${PEAK_BOOKING_SALE_EVENT_ID:1}
  candidate-limit: ${PEAK_BOOKING_CANDIDATE_LIMIT:30}
  total-stock: ${PEAK_BOOKING_TOTAL_STOCK:10}
  payment-policy-version: ${PEAK_BOOKING_PAYMENT_POLICY_VERSION:v1}
  attempt-token-secret: ${PEAK_BOOKING_ATTEMPT_TOKEN_SECRET:local-dev-attempt-token-secret-change-me}
  hold-timeout: ${PEAK_BOOKING_HOLD_TIMEOUT:30s}
  waiting-timeout: ${PEAK_BOOKING_WAITING_TIMEOUT:60s}
  idempotency-retention: ${PEAK_BOOKING_IDEMPOTENCY_RETENTION:24h}
  reconciliation-window: ${PEAK_BOOKING_RECONCILIATION_WINDOW:5m}
  bulkhead:
    booking-write-concurrency: ${PEAK_BOOKING_BOOKING_WRITE_CONCURRENCY:6}
    db-fallback-concurrency: ${PEAK_BOOKING_DB_FALLBACK_CONCURRENCY:2}
    pg-confirm-concurrency: ${PEAK_BOOKING_PG_CONFIRM_CONCURRENCY:5}
    recovery-pg-concurrency: ${PEAK_BOOKING_RECOVERY_PG_CONCURRENCY:1}
    checkout-read-concurrency: ${PEAK_BOOKING_CHECKOUT_READ_CONCURRENCY:2}
  payment:
    call-timeout: ${PEAK_BOOKING_PAYMENT_CALL_TIMEOUT:500ms}
    confirm-recovery-grace: ${PEAK_BOOKING_PAYMENT_CONFIRM_RECOVERY_GRACE:50ms}
    mock-normal-delay: ${PEAK_BOOKING_PAYMENT_MOCK_NORMAL_DELAY:100ms}
    mock-timeout-delay: ${PEAK_BOOKING_PAYMENT_MOCK_TIMEOUT_DELAY:600ms}
  recovery:
    fixed-delay: ${PEAK_BOOKING_RECOVERY_FIXED_DELAY:5s}
    initial-jitter: ${PEAK_BOOKING_RECOVERY_INITIAL_JITTER:5s}
    batch-size: ${PEAK_BOOKING_RECOVERY_BATCH_SIZE:5}
    lease-timeout: ${PEAK_BOOKING_RECOVERY_LEASE_TIMEOUT:30s}
    enabled: ${PEAK_BOOKING_RECOVERY_ENABLED:true}
  redis-warmup-duration: ${PEAK_BOOKING_REDIS_WARMUP_DURATION:2s}

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

logging:
  pattern:
    console: "%d{ISO8601} %-5level [%thread] [traceId=%X{trace_id:-},spanId=%X{span_id:-}] %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,circuitbreakers,circuitbreakerevents
  endpoint:
    prometheus:
      enabled: true
    health:
      show-details: always
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name:unknown}
    distribution:
      percentiles-histogram:
        http.server.requests: true

springdoc:
  info:
    title: Peak Booking API
    version: v1
