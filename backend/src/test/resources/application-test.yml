spring:
  application:
    name: peak-booking-service-test
  datasource:
    url: jdbc:h2:mem:peak_booking;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: optional:classpath:test-data.sql

peak-booking:
  local-queue:
    enabled: false
  recovery:
    enabled: false
