services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: peak_booking
      MYSQL_USER: peak
      MYSQL_PASSWORD: peak
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12

  lgtm:
    image: grafana/otel-lgtm:latest
    ports:
      - "3000:3000"
      - "4317:4317"
      - "4318:4318"
      - "9090:9090"
      - "3100:3100"
      - "3200:3200"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /otel-lgtm/grafana/conf/provisioning/dashboards/custom/jvm-micrometer-4701.json
    volumes:
      - ./infra/observability/prometheus/prometheus.yaml:/otel-lgtm/prometheus.yaml:ro
      - ./infra/observability/grafana/provisioning/dashboards/custom.yaml:/otel-lgtm/grafana/conf/provisioning/dashboards/custom.yaml:ro
      - ./infra/observability/grafana/dashboards/jvm-micrometer-4701.json:/otel-lgtm/grafana/conf/provisioning/dashboards/custom/jvm-micrometer-4701.json:ro

  booking-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: service-booking
    image: peak-booking/service-booking:local
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      lgtm:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/peak_booking?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: peak
      SPRING_DATASOURCE_PASSWORD: peak
      OTEL_SERVICE_NAME: peak-booking-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://lgtm:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
      OTEL_TRACES_EXPORTER: otlp
    ports:
      - "8080:8080"

  k6:
    image: grafana/k6:1.5.0
    profiles: ["loadtest"]
    depends_on:
      - booking-service
    environment:
      BASE_URL: http://booking-service:8080
    volumes:
      - ./k6:/scripts:ro
    command: ["run", "/scripts/health-check.js"]

volumes:
  mysql-data:
