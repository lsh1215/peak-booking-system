apiVersion: v1
kind: ConfigMap
metadata:
  name: booking-service-config
data:
  SERVER_PORT: "8080"
  SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/peak_booking?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
  SPRING_DATASOURCE_USERNAME: "peak"
  SPRING_DATASOURCE_MAX_POOL_SIZE: "10"
  SPRING_DATASOURCE_MIN_IDLE: "2"
  SPRING_DATASOURCE_CONNECTION_TIMEOUT_MS: "250"
  OTEL_SERVICE_NAME: "peak-booking-service"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://lgtm:4318"
  OTEL_EXPORTER_OTLP_PROTOCOL: "http/protobuf"
  OTEL_TRACES_EXPORTER: "otlp"
  OTEL_METRICS_EXPORTER: "none"
  OTEL_LOGS_EXPORTER: "none"
