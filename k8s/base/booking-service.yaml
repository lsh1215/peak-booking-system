apiVersion: v1
kind: Service
metadata:
  name: booking-service
  labels:
    app.kubernetes.io/name: booking-service
    app.kubernetes.io/part-of: peak-booking-system
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: http
  selector:
    app.kubernetes.io/name: booking-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: booking-service
  labels:
    app.kubernetes.io/name: booking-service
    app.kubernetes.io/part-of: peak-booking-system
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: booking-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: booking-service
        app.kubernetes.io/part-of: peak-booking-system
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /actuator/prometheus
        prometheus.io/port: "8080"
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: booking-service
          image: peak-booking/backend:local
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: booking-service-config
            - secretRef:
                name: booking-service-secret
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
