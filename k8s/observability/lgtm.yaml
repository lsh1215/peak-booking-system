apiVersion: v1
kind: Service
metadata:
  name: lgtm
  labels:
    app.kubernetes.io/name: lgtm
    app.kubernetes.io/part-of: peak-booking-system
spec:
  type: ClusterIP
  ports:
    - name: grafana
      port: 3000
      targetPort: grafana
    - name: otlp-grpc
      port: 4317
      targetPort: otlp-grpc
    - name: otlp-http
      port: 4318
      targetPort: otlp-http
    - name: prometheus
      port: 9090
      targetPort: prometheus
    - name: loki
      port: 3100
      targetPort: loki
    - name: tempo
      port: 3200
      targetPort: tempo
  selector:
    app.kubernetes.io/name: lgtm
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lgtm
  labels:
    app.kubernetes.io/name: lgtm
    app.kubernetes.io/part-of: peak-booking-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: lgtm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lgtm
        app.kubernetes.io/part-of: peak-booking-system
    spec:
      containers:
        - name: lgtm
          image: grafana/otel-lgtm:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: Admin
            - name: GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH
              value: /otel-lgtm/grafana/conf/provisioning/dashboards/custom/peak-booking-loadtest-dashboard.json
          ports:
            - name: grafana
              containerPort: 3000
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
            - name: prometheus
              containerPort: 9090
            - name: loki
              containerPort: 3100
            - name: tempo
              containerPort: 3200
          readinessProbe:
            httpGet:
              path: /api/health
              port: grafana
            initialDelaySeconds: 20
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 24
          livenessProbe:
            httpGet:
              path: /api/health
              port: grafana
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          volumeMounts:
            - name: prometheus-config
              mountPath: /otel-lgtm/prometheus.yaml
              subPath: prometheus.yaml
              readOnly: true
            - name: grafana-dashboard-provider
              mountPath: /otel-lgtm/grafana/conf/provisioning/dashboards/custom.yaml
              subPath: custom.yaml
              readOnly: true
            - name: jvm-dashboard
              mountPath: /otel-lgtm/grafana/conf/provisioning/dashboards/custom/peak-booking-loadtest-dashboard.json
              subPath: peak-booking-loadtest-dashboard.json
              readOnly: true
          resources:
            requests:
              cpu: 250m
              memory: 1024Mi
            limits:
              cpu: "2"
              memory: 3072Mi
      volumes:
        - name: prometheus-config
          configMap:
            name: lgtm-prometheus-config
        - name: grafana-dashboard-provider
          configMap:
            name: lgtm-grafana-dashboard-provider
        - name: jvm-dashboard
          configMap:
            name: lgtm-loadtest-dashboard
