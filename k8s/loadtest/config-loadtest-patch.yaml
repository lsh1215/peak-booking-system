apiVersion: v1
kind: ConfigMap
metadata:
  name: booking-service-config
data:
  SPRING_SQL_INIT_MODE: "always"
  SPRING_DATA_REDIS_HOST: "redis"
  SPRING_DATA_REDIS_PORT: "6379"
  SPRING_DATA_REDIS_TIMEOUT: "500ms"
  PEAK_BOOKING_CANDIDATE_LIMIT: "30"
  PEAK_BOOKING_TOTAL_STOCK: "10"
  PEAK_BOOKING_HOLD_TIMEOUT: "30s"
  PEAK_BOOKING_WAITING_TIMEOUT: "60s"
  PEAK_BOOKING_IDEMPOTENCY_RETENTION: "24h"
  PEAK_BOOKING_RECONCILIATION_WINDOW: "5m"
  PEAK_BOOKING_BOOKING_WRITE_CONCURRENCY: "6"
  PEAK_BOOKING_DB_FALLBACK_CONCURRENCY: "2"
  PEAK_BOOKING_PG_CONFIRM_CONCURRENCY: "5"
  PEAK_BOOKING_RECOVERY_PG_CONCURRENCY: "1"
  PEAK_BOOKING_PAYMENT_CALL_TIMEOUT: "500ms"
  PEAK_BOOKING_PAYMENT_CONFIRM_RECOVERY_GRACE: "50ms"
  PEAK_BOOKING_PAYMENT_MOCK_NORMAL_DELAY: "100ms"
  PEAK_BOOKING_PAYMENT_MOCK_TIMEOUT_DELAY: "600ms"
  PEAK_BOOKING_RECOVERY_FIXED_DELAY: "5s"
  PEAK_BOOKING_RECOVERY_INITIAL_JITTER: "5s"
  PEAK_BOOKING_RECOVERY_BATCH_SIZE: "5"
  PEAK_BOOKING_RECOVERY_LEASE_TIMEOUT: "30s"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://lgtm:4318"
