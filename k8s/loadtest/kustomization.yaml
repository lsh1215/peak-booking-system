apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../base
  - ../observability
  - redis-ha.yaml
  - ingress.yaml
  - traefik-rate-limit.yaml

namespace: peak-booking

patches:
  - path: app-loadtest-patch.yaml
  - path: config-loadtest-patch.yaml
  - path: mysql-loadtest-patch.yaml
  - path: redis-loadtest-patch.yaml
  - path: lgtm-loadtest-patch.yaml

images:
  - name: peak-booking/backend
    newTag: loadtest
