apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  labels:
    app.kubernetes.io/component: redis-ha-data
spec:
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/component: redis-ha-data
    spec:
      nodeSelector:
        peak-booking/node-role: redis
        peak-booking/redis-ha: "true"
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - topologyKey: kubernetes.io/hostname
              labelSelector:
                matchLabels:
                  app.kubernetes.io/component: redis-ha-data
      containers:
        - name: redis
          env:
            - name: REDIS_MIN_REPLICAS_TO_WRITE
              value: "1"
            - name: REDIS_MIN_REPLICAS_MAX_LAG_SECONDS
              value: "2"
