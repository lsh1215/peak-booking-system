apiVersion: v1
kind: Service
metadata:
  name: redis-sentinel
  labels:
    app.kubernetes.io/name: redis-sentinel
    app.kubernetes.io/part-of: peak-booking-system
spec:
  ports:
    - name: sentinel
      port: 26379
      targetPort: sentinel
  selector:
    app.kubernetes.io/name: redis-sentinel
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-replica
  labels:
    app.kubernetes.io/name: redis-replica
    app.kubernetes.io/part-of: peak-booking-system
spec:
  replicas: 2
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: redis-replica
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis-replica
        app.kubernetes.io/component: redis-ha-data
        app.kubernetes.io/part-of: peak-booking-system
    spec:
      nodeSelector:
        peak-booking/redis-ha: "true"
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: peak-booking/node-role
                    operator: NotIn
                    values:
                      - redis
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - topologyKey: kubernetes.io/hostname
              labelSelector:
                matchLabels:
                  app.kubernetes.io/component: redis-ha-data
      containers:
        - name: redis
          image: redis:7.4-alpine
          imagePullPolicy: IfNotPresent
          command: ["redis-server"]
          args:
            - "--replicaof"
            - "redis"
            - "6379"
            - "--replica-read-only"
            - "yes"
            - "--min-replicas-to-write"
            - "1"
            - "--min-replicas-max-lag"
            - "2"
          ports:
            - name: redis
              containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-sentinel
  labels:
    app.kubernetes.io/name: redis-sentinel
    app.kubernetes.io/part-of: peak-booking-system
spec:
  replicas: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: redis-sentinel
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis-sentinel
        app.kubernetes.io/component: redis-ha-sentinel
        app.kubernetes.io/part-of: peak-booking-system
    spec:
      nodeSelector:
        peak-booking/redis-ha: "true"
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - topologyKey: kubernetes.io/hostname
              labelSelector:
                matchLabels:
                  app.kubernetes.io/component: redis-ha-sentinel
      containers:
        - name: sentinel
          image: redis:7.4-alpine
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c"]
          args:
            - |
              cat > /tmp/sentinel.conf <<'EOF'
              port 26379
              sentinel resolve-hostnames yes
              sentinel announce-hostnames yes
              sentinel monitor mymaster redis 6379 2
              sentinel down-after-milliseconds mymaster 5000
              sentinel failover-timeout mymaster 10000
              sentinel parallel-syncs mymaster 1
              EOF
              redis-sentinel /tmp/sentinel.conf
          ports:
            - name: sentinel
              containerPort: 26379
          readinessProbe:
            exec:
              command: ["redis-cli", "-p", "26379", "ping"]
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            exec:
              command: ["redis-cli", "-p", "26379", "ping"]
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
